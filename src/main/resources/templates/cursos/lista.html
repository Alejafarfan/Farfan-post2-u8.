<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Cursos</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
        th { background: #065A82; color: white; }
        tr:nth-child(even) { background: #f5f5f5; }
        .btn { padding: 6px 12px; text-decoration: none; border-radius: 4px; }
        .btn-new { background: #2E7D32; color: white; margin-bottom: 1rem; display: inline-block; }
        .btn-inscribir { background: #1C7293; color: white; }
    </style>
</head>
<body>
<h1>Gestión de Cursos</h1>
<a th:href="@{/cursos/nuevo}" class="btn btn-new">+ Nuevo Curso</a>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Créditos</th>
        <th>Estudiantes inscritos</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${cursos}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.nombre}"></td>
        <td th:text="${c.creditos}"></td>
        <td th:text="${#sets.size(c.estudiantes)}"></td>
        <td>
            <a th:href="@{/cursos/{id}/inscribir(id=${c.id})}" class="btn btn-inscribir">Inscribir estudiante</a>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(cursos)}">
        <td colspan="5" style="text-align:center">No hay cursos registrados.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
