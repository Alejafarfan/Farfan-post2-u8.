<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Curso</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        label { display: block; margin-top: 1rem; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; margin-top: 4px; }
        .btn { padding: 8px 16px; margin-top: 1rem; cursor: pointer; }
        .btn-save { background: #065A82; color: white; border: none; border-radius: 4px; }
        .btn-cancel { background: #808080; color: white; text-decoration: none; border-radius: 4px; padding: 8px 16px; }
        .error { color: red; font-size: 13px; }
    </style>
</head>
<body>
<h1>Nuevo Curso</h1>
<form th:action="@{/cursos/guardar}" th:object="${curso}" method="post">
    <input type="hidden" th:field="*{id}">

    <label for="nombre">Nombre:</label>
    <input type="text" th:field="*{nombre}" id="nombre">
    <span class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>

    <label for="creditos">Créditos:</label>
    <input type="number" th:field="*{creditos}" id="creditos" min="1">

    <br>
    <button type="submit" class="btn btn-save">Guardar Curso</button>
    <a th:href="@{/cursos}" class="btn btn-cancel">Cancelar</a>
</form>
</body>
</html>
