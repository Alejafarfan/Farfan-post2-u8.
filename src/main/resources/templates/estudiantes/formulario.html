<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${titulo}">Formulario</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
        h1 { color: #333; }
        .form-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 500px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="email"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .error { color: #dc3545; font-size: 13px; margin-top: 4px; }
        .btn { padding: 9px 18px; border-radius: 5px; text-decoration: none; font-size: 14px; border: none; cursor: pointer; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
    </style>
</head>
<body>
<h1 th:text="${titulo}"></h1>
<div class="form-card">
    <form th:action="@{/estudiantes/guardar}" th:object="${estudiante}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="form-group">
            <label>Nombre:</label>
            <input type="text" th:field="*{nombre}" />
            <span class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
        </div>
        <div class="form-group">
            <label>Apellido:</label>
            <input type="text" th:field="*{apellido}" />
            <span class="error" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></span>
        </div>
        <div class="form-group">
            <label>Correo:</label>
            <input type="email" th:field="*{correo}" />
            <span class="error" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></span>
        </div>
        <div class="form-group">
            <label>Carrera:</label>
            <input type="text" th:field="*{carrera}" />
            <span class="error" th:if="${#fields.hasErrors('carrera')}" th:errors="*{carrera}"></span>
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
        <a th:href="@{/estudiantes}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
