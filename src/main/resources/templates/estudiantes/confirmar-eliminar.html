<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Confirmar Eliminación</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 450px; }
        h1 { color: #dc3545; }
        p { color: #555; font-size: 16px; }
        .btn { padding: 9px 18px; border-radius: 5px; text-decoration: none; font-size: 14px; border: none; cursor: pointer; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
    </style>
</head>
<body>
<div class="card">
    <h1>¿Eliminar estudiante?</h1>
    <p>¿Estas seguro de que deseas eliminar a
        <strong th:text="${estudiante.nombre + ' ' + estudiante.apellido}"></strong>?
    </p>
    <form th:action="@{/estudiantes/eliminar/{id}(id=${estudiante.id})}" method="post">
        <button type="submit" class="btn btn-danger">Si, eliminar</button>
        <a th:href="@{/estudiantes}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
