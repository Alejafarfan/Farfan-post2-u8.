<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Estudiantes</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
        h1 { color: #333; }
        .btn { padding: 8px 14px; border-radius: 5px; text-decoration: none; font-size: 14px; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-warning { background-color: #ffc107; color: black; }
        .btn-danger { background-color: #dc3545; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th { background-color: #007bff; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>
<h1>Lista de Estudiantes</h1>
<a th:href="@{/estudiantes/nuevo}" class="btn btn-primary">+ Nuevo Estudiante</a>
<table>
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Correo</th>
        <th>Carrera</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="e : ${estudiantes}">
        <td th:text="${e.nombre}"></td>
        <td th:text="${e.apellido}"></td>
        <td th:text="${e.correo}"></td>
        <td th:text="${e.carrera}"></td>
        <td>
            <a th:href="@{/estudiantes/editar/{id}(id=${e.id})}" class="btn btn-warning">Editar</a>
            <a th:href="@{/estudiantes/eliminar/{id}(id=${e.id})}" class="btn btn-danger">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
